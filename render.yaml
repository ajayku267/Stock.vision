services:
  - type: web
    name: stockvision-backend
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend:app --host 0.0.0.0 --port $PORT

  - type: web
    name: stockvision-frontend
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run main.py --server.address 0.0.0.0 --server.port $PORT --server.headless true
    envVars:
      - key: STOCKVISION_USE_BACKEND_DEFAULT
        value: "true"
      - key: STOCKVISION_BACKEND_URL
        fromService:
          type: web
          name: stockvision-backend
          property: host
